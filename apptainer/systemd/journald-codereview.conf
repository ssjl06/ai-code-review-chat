# journald log rotation / size caps. Logs from the codereview-* units go to the
# journal (stdout/stderr); journald rotates them automatically within these caps.
#
# Install to: /etc/systemd/journald.conf.d/codereview.conf
# Then:        sudo systemctl restart systemd-journald
#
# NOTE: these are global journald settings (they bound the whole journal, which
# includes the codereview units). Persistent storage lives under /var/log/journal.

[Journal]
Storage=persistent
# Total cap for the persistent journal and per-file cap.
SystemMaxUse=500M
SystemMaxFileSize=50M
# Time-based retention (whichever limit is hit first applies).
MaxRetentionSec=2week
# Throttle log floods from any one service.
RateLimitIntervalSec=30s
RateLimitBurst=10000
