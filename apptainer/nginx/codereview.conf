# Reverse proxy for the code-review app: TLS termination → app on 127.0.0.1:${PORT}.
# Install to /etc/nginx/conf.d/codereview.conf (or sites-available + symlink), then `nginx -t && systemctl reload nginx`.
#
# Critical bits:
#  - X-Forwarded-Proto/Host: so Auth.js builds correct HTTPS OAuth callback URLs.
#  - proxy_buffering off: so AI chat responses stream to the browser (no buffering).
#  - large header buffers: GitHub OAuth cookies/headers can be big.

upstream codereview_app {
    server 127.0.0.1:3000;   # must match PORT/HOSTNAME in the app env
    keepalive 32;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name codereview.corp.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name codereview.corp.example.com;

    # Corporate CA / internal cert (self-signed is fine for on-prem).
    ssl_certificate     /etc/ssl/codereview/fullchain.pem;
    ssl_certificate_key /etc/ssl/codereview/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;

    large_client_header_buffers 4 16k;
    client_max_body_size 10m;

    location / {
        proxy_pass http://codereview_app;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;   # "https" here → OAuth callbacks are https
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Connection        "";

        # Stream AI chat (chunked/SSE) responses without buffering, allow long generations.
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
